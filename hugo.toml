baseURL = 'https://piyushdadheech.com/'
languageCode = 'en-us'
title = "Piyush Dadheech"
theme = 'PaperMod'

[params]
  defaultTheme = "auto" # dark, light, or auto
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

[params.homeInfoParams]
  Title = "Hi, I'm Piyush"
  Content = "I'm Piyush, endlessly curious, a tad confused, wannabe writer. Welcome to my corner of the internet."


